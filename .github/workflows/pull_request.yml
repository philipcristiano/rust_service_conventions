name: Pull Request

on:

  pull_request:
    branches:
      - main

jobs:

  check-for-cc:
    runs-on: ubuntu-latest
    steps:
      - name: check-for-cc
        id: check-for-cc
        uses: agenthunt/conventional-commit-checker-action@v2.0.1

  flake:
    runs-on: nixos-latest
    steps:
      - name: Install Node
        run: nix-env -iA nixpkgs.nodejs
      - uses: actions/checkout@v4
      - name: Build
        env:
          SQLX_OFFLINE: true
        run: nix --experimental-features 'nix-command flakes' develop --command cargo build
    uses: "philipcristiano/workflows/.github/workflows/nix.yml@main"
    with:
      script: |
        cargo build
